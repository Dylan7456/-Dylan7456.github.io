<style>

  /* --- FOND GALAXIE --- */
  body {
      margin: 0;
      padding: 0;
      background-color: black;
      background-image: url("../galaxie.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
  }

  /* --- CHAKRA ANIMÉ --- */
  .chakra-bg {
      position: absolute;
      width: 350px;          /* Taille idéale */
      opacity: 0.10;         /* Option B : visible mais zen */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: rotate 60s linear infinite, halo 6s ease-in-out infinite;
      z-index: 1;            /* Derrière le panneau */
  }

  @keyframes rotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
  }

  @keyframes halo {
      0%   { filter: drop-shadow(0 0 5px #ffffff); }
      50%  { filter: drop-shadow(0 0 25px #a67bff); }
      100% { filter: drop-shadow(0 0 5px #ffffff); }
  }

  /* --- PANNEAU CENTRAL --- */
  .panel {
      background: rgba(0, 0, 0, 0.55);
      padding: 25px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      text-align: center;
      width: 80%;
      max-width: 450px;
      z-index: 2;            /* Devant le chakra */
      color: #f5f5f5;
      font-family: "Georgia", serif;
  }

</style>
